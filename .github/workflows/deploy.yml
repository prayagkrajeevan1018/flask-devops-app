name: CI/CD Pipeline - Build and Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/flask-devops-app:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/flask-devops-app:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/flask-devops-app:${{ github.sha }}

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/flask-devops-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/flask-devops-app:${{ github.sha }}

      - name: Deployment summary
        run: |
          echo "✅ Docker image pushed successfully"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/flask-devops-app:latest"
          echo "Commit: ${{ github.sha }}"
          echo "Railway auto-deploys from GitHub - app will be live shortly"